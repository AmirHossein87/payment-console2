name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      # 0️⃣ TEMP DEBUG: confirm deploy secrets are actually non-empty in this job.
      # Never prints the values themselves — only whether each is set and how long it is.
      # Remove this step once the deploy issue is confirmed fixed.
      - name: Debug secret presence
        env:
          H: ${{ secrets.DEPLOY_HOST }}
          U: ${{ secrets.DEPLOY_USER }}
          P: ${{ secrets.DEPLOY_PATH }}
          K: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          check() {
            name="$1"; val="$2"
            if [ -z "$val" ]; then
              echo "❌ $name is EMPTY in this job"
            else
              echo "✅ $name is set (length: ${#val} chars)"
            fi
          }
          check DEPLOY_HOST "$H"
          check DEPLOY_USER "$U"
          check DEPLOY_PATH "$P"
          check DEPLOY_SSH_KEY "$K"

      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      # 2️⃣ Install dependencies & build Angular project directly to /www
      - name: Build Angular project
        run: |
          npm install
          npx ng build --configuration production --output-path=www --base-href=/
          # Move inner browser folder (if created) contents up to www root
          if [ -d "www/browser" ]; then
            mv www/browser/* www/
            rm -rf www/browser
          fi
          if [ ! -f "www/index.html" ]; then
            echo "Error: index.html not found in build output"
            exit 1
          fi

      # 3️⃣ Setup SSH key for deployment
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      # 4️⃣ Deploy build output directly to DEPLOY_PATH
      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo mkdir -p ${{ secrets.DEPLOY_PATH }} && sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} ${{ secrets.DEPLOY_PATH }}"

          # Copy only the contents of www/, not the folder itself
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            www/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

      # 5️⃣ Restart Caddy Service
      - name: Restart Caddy Service
        if: success()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "sudo systemctl restart caddy || true"
