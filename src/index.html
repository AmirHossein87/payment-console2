<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Payment Console</title>
    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- 48x48 square app icon (PNG bytes, .ico name) — clear in the browser tab. -->
    <link rel="icon" type="image/png" href="./assets/icon/logo__app.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />

    <!-- Critical inline CSS: applies the icon font-family from the very first
         paint (before the bundle CSS injects in dev) so Material Symbols never
         flash as raw ligature text (e.g. "receipt_long") on a hard refresh.
         Paired with `display=block` above, glyphs stay invisible until the font
         loads, then render as icons. -->
    <style>
      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        font-feature-settings: "liga";
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
      }
    </style>

    <link
      id="app-theme"
      rel="stylesheet"
      href="./assets/css/theme-md-light-indigo.css"
      type="text/css"
    />

    <meta
      name="google-signin-client_id"
      content="215465091608-8v4p5khbsse4jbbrpmkkjoagl3dgi7ss.apps.googleusercontent.com"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
