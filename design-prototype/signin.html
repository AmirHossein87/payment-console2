<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — BrandName</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<style>
/* ===== shared design tokens (same as the admin prototype) ===== */
:root{
  --brand-500:#3880ff; --brand-600:#2f6fe6; --brand-700:#1f5bd0;
  --brand-weak-2:#d4e5ff;
  --app-bg:#f5f6f8; --surface:#fff; --surface-2:#fafbfc;
  --border:#e6e8ee; --border-strong:#d4d8e0;
  --text:#0f172a; --text-2:#475569; --text-3:#94a3b8;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --sh-sm:0 1px 2px rgba(16,24,40,.05); --sh-md:0 4px 12px rgba(16,24,40,.08); --sh-lg:0 18px 50px rgba(16,24,40,.14);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
[data-theme="dark"]{
  --app-bg:#0b1120; --surface:#111827; --surface-2:#0f1626;
  --border:#1f2937; --border-strong:#334155;
  --text:#f1f5f9; --text-2:#94a3b8; --text-3:#64748b;
  --brand-weak-2:#16336b;
  --sh-lg:0 18px 50px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);color:var(--text);
  background:
    radial-gradient(900px 500px at 100% 0%, rgba(56,128,255,.10), transparent 60%),
    radial-gradient(800px 500px at 0% 100%, rgba(82,96,255,.08), transparent 55%),
    var(--app-bg);
  display:grid;place-items:center;min-height:100vh;padding:24px;
}
.material-symbols-outlined{font-size:20px;line-height:1;vertical-align:middle}

.theme-toggle{position:fixed;top:18px;right:18px;width:40px;height:40px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;cursor:pointer;color:var(--text-2)}
.theme-toggle:hover{color:var(--text)}

.card{
  width:100%;max-width:420px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r-lg);
  box-shadow:var(--sh-lg);padding:36px 34px;
}

.brand{display:flex;align-items:center;gap:11px;font-weight:700;margin-bottom:26px}
.brand-icon{width:38px;height:38px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand-500),#5260ff);color:#fff;border-radius:11px;font-weight:800;font-size:1.2rem;box-shadow:var(--sh-md)}
.brand .nm{font-size:1.05rem;letter-spacing:.2px}

h1{font-size:1.7rem;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
.subtitle{color:var(--text-2);margin-bottom:24px;font-size:.95rem}

.social-btn,.submit-btn{width:100%;border:0;border-radius:var(--r-md);font:inherit;cursor:pointer;outline:none;transition:.18s ease}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--surface-2);color:var(--text);padding:13px;font-weight:600;border:1px solid var(--border-strong)}
.social-btn:hover{background:var(--border);transform:translateY(-1px)}
.social-btn:active{transform:translateY(1px)}
.social-icon{width:22px;height:22px;display:grid;place-items:center;border-radius:50%;background:#fff;padding:2px}

.divider{position:relative;text-align:center;color:var(--text-3);font-size:.9rem;margin:20px 0}
.divider::before{content:'';position:absolute;left:0;top:50%;width:100%;height:1px;background:var(--border)}
.divider span{position:relative;background:var(--surface);padding:0 12px}

form{display:flex;flex-direction:column;gap:12px}
label{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:-4px}
input[type=email],input[type=password],input[type=text]{
  width:100%;padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--border-strong);
  outline:none;font:inherit;background:var(--surface);color:var(--text);transition:.18s ease;
}
input::placeholder{color:var(--text-3)}
input:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px var(--brand-weak-2)}

.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px}
.forgot-link{font-size:.85rem}
a.link{color:var(--brand-600);text-decoration:none;font-weight:600}
a.link:hover{color:var(--brand-700);text-decoration:underline}

.submit-btn{background:var(--brand-500);color:#fff;padding:13px;font-weight:700;margin-top:12px;box-shadow:0 4px 12px rgba(56,128,255,.25)}
.submit-btn:hover:not(:disabled){background:var(--brand-600);transform:translateY(-1px)}
.submit-btn:active:not(:disabled){transform:translateY(1px)}
.submit-btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}

.toggle-text{text-align:center;color:var(--text-2);margin-top:24px;font-size:.9rem}
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme"><span class="material-symbols-outlined">dark_mode</span></button>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">P</div>
      <span class="nm">BrandName</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to your account</p>

    <button class="social-btn" type="button">
      <span class="social-icon">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
      </span>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <form id="signinForm" onsubmit="return false">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required placeholder="you@example.com" />

      <div class="row-between">
        <label for="password">Password</label>
        <a class="link forgot-link" href="#">Forgot password?</a>
      </div>
      <input id="password" type="password" name="password" required placeholder="Enter your password" />

      <button class="submit-btn" type="submit" id="submitBtn">Sign In</button>
    </form>

    <p class="toggle-text">Don't have an account? <a class="link" href="#">Sign up</a></p>
  </div>

<script>
const tt=document.getElementById('themeToggle');
tt.addEventListener('click',()=>{const r=document.documentElement,d=r.getAttribute('data-theme')==='dark';r.setAttribute('data-theme',d?'light':'dark');tt.querySelector('.material-symbols-outlined').textContent=d?'dark_mode':'light_mode';});
// disable submit until valid (mirrors [disabled]="!form.valid")
const f=document.getElementById('signinForm'),b=document.getElementById('submitBtn');
function chk(){b.disabled=!f.checkValidity();}
f.addEventListener('input',chk);chk();
</script>
</body>
</html>
